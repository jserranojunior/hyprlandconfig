###########################################
#       SOUNDBOARD (SUPER + CONTROL)      #
###########################################

# CONTROLes de Início/Fim
# Atalho para abrir o Painel do Soundboard e o Vesktop juntos
bind = SUPER CONTROL, 0, exec,  vesktop

# Gatilhos de Áudio (Com função Toggle - Aperta de novo para parar)
bind = SUPER CONTROL, 2, exec, /opt/hyprlandconfig/soundboard/tocar.sh 2.mp3
bind = SUPER CONTROL, 3, exec, /opt/hyprlandconfig/soundboard/tocar.sh 3.mp3
bind = SUPER CONTROL, 4, exec, /opt/hyprlandconfig/soundboard/tocar.sh 4.mp3
bind = SUPER CONTROL, 5, exec, /opt/hyprlandconfig/soundboard/tocar.sh 5.mp3
bind = SUPER CONTROL, 6, exec, /opt/hyprlandconfig/soundboard/tocar.sh 6.mp3
bind = SUPER CONTROL, 7, exec, /opt/hyprlandconfig/soundboard/tocar.sh 7.mp3
bind = SUPER CONTROL, 8, exec, /opt/hyprlandconfig/soundboard/tocar.sh 8.mp3