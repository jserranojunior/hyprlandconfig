# --- Screenshot da Tela Inteira com Delay de Segurança ---
bind = SUPER, X, exec, bash -c 'FILE=~/Imagens/Screenshots/screenshot-$(date +%Y-%m-%d_%H-%M-%S).png && grim "$FILE" && wl-copy < "$FILE" && notify-send "Captura" "Salva com sucesso"'
# --- Screenshot de Área com Delay de Segurança ---
bind = SUPER SHIFT, X, exec, bash -c 'AREA=$(slurp) && FILE=~/Imagens/Screenshots/screenshot-$(date +%Y-%m-%d_%H-%M-%S).png && grim -g "$AREA" "$FILE" && wl-copy < "$FILE" && sleep 0.2 && notify-send -i "$FILE" "Área Capturada" "Imagem salva e copiada!"'