#################################################
#            HYPRLAND WINDOW RULES              #
#################################################

# --- SISTEMA & POPUPS ---
# Removido o "=" e os espaços para evitar o erro "missing a value"
windowrule = float,^(Open File|Save As|Confirm)$
windowrule = center,^(Open File|Save As|Confirm)$

# --- PERFORMANCE & IDLE ---
windowrule = idleinhibit fullscreen,fullscreen:1

# Regra para janelas em tela cheia (Tearing/Immediate)
windowrule = immediate,^(steam_app_.*)$
windowrule = immediate,^(gamescope)$


# Regra agressiva para QUALQUER janela do Awakened (XWayland)
windowrulev2 = float, class:^(.*[Aa]wakened.*)$
windowrulev2 = noblur, class:^(.*[Aa]wakened.*)$
windowrulev2 = noshadow, class:^(.*[Aa]wakened.*)$
windowrulev2 = noborder, class:^(.*[Aa]wakened.*)$
windowrulev2 = opaque, class:^(.*[Aa]wakened.*)$
windowrulev2 = ignorealpha 1, class:^(.*[Aa]wakened.*)$
windowrulev2 = pin, class:^(.*[Aa]wakened.*)$

# Regra de camada universal (isso costuma matar o borrão fantasma)
layerrule = noblur, .*
layerrule = ignorezero, .*